spring:
  application:
    name: Razorpay

  datasource:
      url: jdbc:postgresql://localhost:5432/Razorpaydb
      username: postgres
      password: MyNewPassword123
      driver-class-name: org.postgresql.Driver

  jpa:
      hibernate:
        ddl-auto: update
      show-sql: true
      properties:
        hibernate:
          dialect: org.hibernate.dialect.PostgreSQLDialect
